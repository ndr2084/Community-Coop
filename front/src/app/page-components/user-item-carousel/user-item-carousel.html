<div class="carousel">
  @if (photos().length) {
    <div class="carousel-viewport">
      <div class="carousel-track" [style.transform]="'translateX(' + trackOffset() + 'px)'">
        @for (photo of photos(); track $index; let i = $index) {
          <img
            [src]="photo"
            alt="item photo"
            class="carousel-photo"
            [class.current-photo]="i === currentIndex()"
            [class.side-photo]="i !== currentIndex()"
            (click)="goTo(i)">
        }
      </div>

      @if (photos().length > 1) {
        <button
          type="button"
          class="nav-arrow prev"
          aria-label="Previous photo"
          [disabled]="!hasPrev()"
          (click)="prev()">
          &#10094;
        </button>

        <button
          type="button"
          class="nav-arrow next"
          aria-label="Next photo"
          [disabled]="!hasNext()"
          (click)="next()">
          &#10095;
        </button>
      }
    </div>
  }

  @if (photos().length > 1) {
    <div class="carousel-dots">
      @for (photo of photos(); track $index; let i = $index) {
        <button
          type="button"
          class="dot"
          [class.active]="i === currentIndex()"
          [attr.aria-current]="i === currentIndex()"
          [attr.aria-label]="'Go to photo ' + (i + 1)"
          (click)="goTo(i)">
        </button>
      }
    </div>
  }
</div>
