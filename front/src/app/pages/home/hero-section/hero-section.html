<app-header></app-header>

<div class="grid-wrapper">
  <div class="zero greeting">
    <h1 class="greeting">Welcome, {{index.userIndex.name}}</h1>
  </div>

  <div class="one buy glass hero-button">
    <p class="card-description">Shop local for sweet deals</p>
    <h1 (click)="viewShop()" class="button-text">Shop</h1>
  </div>

  <div class="three rent glass hero-button">
    <p class="card-description">Your outdoor adventure on a budget</p>
    <h1 (click)="viewRentals()" class="button-text">Rent</h1>
  </div>

  <div class="two sell glass hero-button">
    <p class="card-description">Sell your items on the market</p>
    <h1 (click)="viewSelling()" class="button-text">Sell</h1>
  </div>
</div>
