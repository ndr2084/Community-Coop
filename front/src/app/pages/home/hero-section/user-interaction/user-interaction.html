<form [formGroup]="searchForm" class="search-form" (submit)="submitForm()">
  <h2>Start Your Search Here</h2>

  <label for="country">Country</label>
  <input type="text" id="country" formControlName="country">

  <label for="province">Province</label>
  <input type="text" id="province" formControlName="province">

  <label for="city">City</label>
  <input type="text" id="city" formControlName="city">

  <label for="combo">Item</label>
  <input list="items" name="combo" id="combo" formControlName="item">
    <datalist id="items">
      <option value="Carabiner"></option>
      <option value="Tent"></option>
      <option value="Canoe"></option>
      <option value="Kayak"></option>
      <option value="Harness"></option>
      <option value="Rope"></option>
    </datalist>

    <div class="pr-btn">
    <button type="submit">Submit</button>
    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000">

    </svg>
    </div>
</form>
