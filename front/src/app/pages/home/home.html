<div class="hero-components">

    <h1 class="greeting">Welcome {{index.userIndex.name}}</h1>


    <div class="user-action-filter">

      <div class="buy card">
        <img src="cart-20.svg" alt="">
        <p class="card-description">Shop local and find sweet deals</p>
        <h1 (click)="viewShop()"class="button-text">Shop</h1>

      </div>

      <div class="rent card">
        <img src="tent-20.svg" alt="">

        <p class="card-description">Your outdoor adventure on a budget</p>
        <h1 (click)="viewRentals()" class="button-text">Rent</h1>
      </div>

      <div class="sell card">
        <img src="money-exchange-20.svg" alt="">
        <p class="card-description">Sell your items on the market</p>
        <h1 (click)="viewSelling()"class="button-text">Sell</h1>
      </div>
    </div>

</div>
<h2 (click)="missionStatement()" class="logo">Keep it local. Keep it ethical.</h2>
