@for(item of itemList() ; track item.id){
<div class="shop-item card-size">
  <div class="carousel" aria-label="image carousel">
    @for(picture of item.picture ; track picture)
    {
    <img class="picture" src="{{picture}}" alt="{{item.name}}">
    }
  </div>


  <div class="item-meta-data">

    <div class="name-and-price ">
      <p>{{item.name}}</p>
    </div>
    <div class="sell-and-rental-status">
      <p class="price">excellent condition{{item.condition}}</p>
      @if(item.isForRent){
        <p class=" price"> rent for ${{item.price}} / day</p>
      }
      @if(item.isForSale){
      <p class="price"> purchase for $800</p>
      }
    </div>
    <p class="description">{{item.description}}</p>
  </div>
</div>
}
