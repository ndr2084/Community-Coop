<h1> {{index.userIndex.name}}'s Shop</h1>

<button class="button-text" (click)="addItem()">Add Item</button>
<button class="button-text" (click)="removeItem()">Remove Item</button>
<button class="button-text" (click)="editItem()">Edit Item</button>
<button class="button-text" (click)="viewShop()">View in Buyer Mode</button>

<div class="shop-gallery">
  @for(item of itemList() ; track item.id){
  <div class="shop-item">
    <p>Name: {{item.name}}</p>
    <p>Description: {{item.description}}</p>
    <p>price: {{item.price}}</p>
    <p>is for rent: {{item.isForRent}}</p>
    <p>is for sale: {{item.isForSale}}</p>
    <p>condition: {{item.condition}}</p>
    <p>picture{{item.picture}}</p>
  </div>

  }

</div>
