<app-header></app-header>
<div class="grid-wrapper">

  <nav class="side-panel">
    <ul class="panel-button-list">
      <button class="add-item panel-button" (click)="addItem()">Add Item</button>
      <button class="remove-item panel-button" (click)="removeItem()">Remove Item</button>
      <button class="edit-item panel-button" (click)="editItem()">Edit Item</button>
      <button class="buyer-mode panel-button" (click)="viewShop()">Buyer Mode</button>
    </ul>
  </nav>
</div>

<div class="shop-gallery">
  @for(item of itemList() ; track item.id){
  <div class="shop-item">


    <div class="carousel" aria-label="image carousel">
      @for(picture of item.picture ; track picture)
      {
      <div class="slide">
        <img class="picture" src="{{picture}}" alt="{{item.name}}">
      </div>
      }
    </div>



    <div class="name-and-price">
      <p>{{item.name}}</p>
      <p> ${{item.price}}</p>
    </div>
    <p class="description">{{item.description}}</p>
    @if(item.isForRent){
    <p>is for rent: {{item.isForRent}}</p>
    }
    @if(item.isForSale){
    <p>is for sale: {{item.isForSale}}</p>
    }
    <p>condition: {{item.condition}}</p>
  </div>
  }
</div>
